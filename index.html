<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">
    <div class="cart bg-emerald-950 text-white w-full max-w-md h-auto m-2 rounded-2xl p-5">
        <h1 class="text-2xl md:text-3xl font-bold text-center mb-5">
            Weather App 🌤
        </h1>
        <!-- search field -->
        <div class="search flex items-center justify-center gap-3">
            <input class="m-2 p-2 w-full md:w-auto outline-none rounded-xl text-black items-center hover:bg-gray-300"
                id="search-input" type="text" placeholder="enter the city name">
            <button id="search-btn" class="bg-blue-500 text-white p-2 rounded-xl hover:bg-blue-600">Search</button>
        </div>
        <!-- weather icon -->
        <div class="flex items-center justify-center mt-5">
            <img class='w-20 md:w-40' id='weather-icon' src="images/clear.png" alt="">
        </div>
        <!-- Temperature and City field -->
        <div class="weather flex items-center justify-center flex-col mt-1 gap-3">
            <div class="temp text-4xl md:text-5xl">0 °c</div>
            <div class="city text-2xl md:text-3xl">City</div>

            <div class="details flex flex-cols md:flex-row items-center justify-center gap-6 md:gap-12 mt-5">
                <div class="humidy-container">
                    <img src="images/humidity.png" alt="">
                    <div>
                        <div class="humidy">55%</div>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="wind-container flex items-center justify-center gap-3">
                    <img src="images/wind.png" alt="">
                    <div>
                        <div class="wind">15Km/h</div>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const inputCity = document.querySelector("#search-input");
        const searchBtn = document.querySelector("#search-btn");
        const weatherIcon = document.querySelector("#weather-icon");

        searchBtn.addEventListener('click', () => {
            //alert('hi')
            checkWeather(inputCity.value);
        })
        //api
        const apiKey = "4099bae51625cdd59c02e0920f075e2d";
        const apiUrl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

        async function checkWeather(city) {
            const response = await fetch(apiUrl + city + `&appid=${apiKey}`);
            var data = await response.json();//convert into json formate
            console.log(data);

            document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + " °c";
            document.querySelector(".city").innerHTML = data.name;
            document.querySelector(".humidy").innerHTML = data.main.humidity + " %";
            document.querySelector(".wind").innerHTML = data.wind.speed + " km/h";
            // weatherIcon.src = "https://openweathermap.org/img/wn/" + data.weather[0].icon + ".png";
            //weatherIcon.src='images/clouds.png'
            if (data.weather[0].main == "Clouds") {
                weatherIcon.src = 'images/clouds.png'
            }
            else if (data.weather[0].main == "Clear") {
                weatherIcon.src = 'images/clear.png'
            }
            else if (data.weather[0].main == "Rain") {
                weatherIcon.src = 'images/rain.png'
            }
            else if (data.weather[0].main == "Drizzle") {
                weatherIcon.src = 'images/drizzle.png'
            }
            else if (data.weather[0].main == "Mist") {
                weatherIcon.src = 'images/mist.png'
            }
        }
    </script>
</body>

</html>
